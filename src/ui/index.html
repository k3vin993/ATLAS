<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLAS Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">ATLAS<span>MCP</span></div>
      <div class="logo-sub">v0.1 dashboard</div>
    </div>
    <nav class="nav">
      <div class="nav-item active" data-page="dashboard">
        <span class="nav-icon">&#x2B21;</span> Dashboard
      </div>
      <div class="nav-item" data-page="connectors">
        <span class="nav-icon">&#x26A1;</span> Connectors
      </div>
      <div class="nav-item" data-page="explorer">
        <span class="nav-icon">&#x25EB;</span> Explorer
      </div>
      <div class="nav-item" data-page="playground">
        <span class="nav-icon">&#x25B7;</span> Playground
      </div>
      <div class="nav-item" data-page="chat">
        <span class="nav-icon">&#x25C9;</span> Chat
      </div>
      <div class="nav-item" data-page="knowledge">
        <span class="nav-icon">&#128214;</span> Knowledge
      </div>
      <div class="nav-item" data-page="import">
        <span class="nav-icon">&#x2B06;</span> Import Data
      </div>
      <div class="nav-item" data-page="modules">
        <span class="nav-icon">&#x29C9;</span> Modules
      </div>
    </nav>
    <div class="nav-bottom">
      <div class="nav-item" data-page="settings">
        <span class="nav-icon">&#9881;</span> Settings
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="status-dot" id="sidebar-dot" title="Running"></div>
      <span>System online</span>
    </div>
  </aside>

  <div class="main">
    <div id="page-content"></div>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
